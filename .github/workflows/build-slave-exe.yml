name: Build Breakeven_Slave EXE

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_suffix: windows
            exe_name: Breakeven_Slave.exe
          - os: ubuntu-latest
            artifact_suffix: linux
            exe_name: Breakeven_Slave
          - os: macos-latest
            artifact_suffix: macos
            exe_name: Breakeven_Slave

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: breakeven
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict
          auto-update-conda: true

      - name: Install core dependencies (conda)
        shell: bash -l {0}
        run: |
          conda install -y             python="3.11"             numpy=1.24.4             pandas=1.5.3             pandas-ta=0.3.14b0             scipy=1.10.1             numba=0.57.1             pyarrow=12.0.1             pyqt=5.15.9             tqdm=4.66.1             setuptools=68.2.2             pip




      - name: Build Breakeven_Slave
        shell: bash -l {0}
        run: >
          pyinstaller --onefile Breakeven_Slave.py
          --name Breakeven_Slave
          --hidden-import breakeven_quant
          --hidden-import pandas_ta
          --hidden-import ta
          --hidden-import backtesting
          --hidden-import bokeh
          --hidden-import seaborn
          --hidden-import plotly
          --hidden-import numba
          --hidden-import pyarrow

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Breakeven_Slave-${{ matrix.artifact_suffix }}
          path: dist/${{ matrix.exe_name }}
