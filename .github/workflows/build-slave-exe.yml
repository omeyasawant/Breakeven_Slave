name: Build Breakeven_Slave EXE

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_suffix: windows
            exe_name: Breakeven_Slave.exe
          - os: ubuntu-latest
            artifact_suffix: linux
            exe_name: Breakeven_Slave
          - os: macos-latest
            artifact_suffix: macos
            exe_name: Breakeven_Slave

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Breakeven_Slave
        run: >
          pyinstaller --onefile Breakeven_Slave.py
          --name Breakeven_Slave
          --hidden-import breakeven_quant
          --hidden-import pandas_ta
          --hidden-import ta
          --hidden-import backtesting
          --hidden-import bokeh
          --hidden-import seaborn
          --hidden-import plotly
          --hidden-import numba
          --hidden-import pyarrow

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Breakeven_Slave-${{ matrix.artifact_suffix }}
          path: dist/${{ matrix.exe_name }}
