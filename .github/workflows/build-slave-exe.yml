name: Build Breakeven_Slave EXE

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Breakeven_Slave.exe
        run: |
          pyinstaller --onefile Breakeven_Slave.py
          --name Breakeven_Slave
          --hidden-import breakeven_quant
          --hidden-import pandas_ta
          --hidden-import ta
          --hidden-import backtesting
          --hidden-import bokeh
          --hidden-import seaborn
          --hidden-import plotly
          --hidden-import numba
          --hidden-import pyarrow

      - name: Verify EXE exists
        shell: pwsh
        run: |
          if (!(Test-Path -Path "dist/Breakeven_Slave.exe")) {
            Write-Error "Breakeven_Slave.exe not found in dist/"
            exit 1
          }
          Write-Host "✅ Breakeven_Slave.exe found."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Breakeven_Slave-windows
          path: dist/Breakeven_Slave.exe

  verify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Breakeven_Slave-windows
          path: downloaded/

      - name: List files
        run: ls -R downloaded/

      - name: Ensure EXE present
        run: |
          count=$(find downloaded -type f -name "Breakeven_Slave.exe" | wc -l)
          if [ "$count" -lt 1 ]; then
            echo "❌ No Breakeven_Slave.exe found."
            exit 1
          fi
          echo "✅ Found Breakeven_Slave.exe."
